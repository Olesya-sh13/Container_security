# =============================================================================
# Docker Compose v2.0 — Контейнер журналирования событий доступа (HTTPS)
#
# Сервисы:
#   app    — Django-приложение (внутренняя сеть, порт 8000)
#   nginx  — Обратный прокси с TLS-терминацией (порты 80, 443)
#   logger — Контейнер журналирования событий доступа v2.0
# =============================================================================

version: '3.9'

services:

  # ── Веб-приложение ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: access-logger-app:2.0.0
    container_name: kjd_app
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=django_project.settings
      - PYTHONUNBUFFERED=1
      # Заголовок ALLOWED_HOSTS формируется через переменную окружения
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,app}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    volumes:
      # Именованный том для данных приложения (SQLite, логи)
      - app_data:/app/logger_app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/logger/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Обратный прокси Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: kjd_nginx
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → редирект на HTTPS
      - "443:443"   # HTTPS
    volumes:
      # Конфигурационный файл Nginx (только чтение)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS-сертификаты (только чтение, секреты не в git)
      - ./certs:/etc/nginx/certs:ro
      # Том журналов: Nginx пишет, logger читает
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
      - internal
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Контейнер журналирования событий доступа (КЖД) v2.0 ────────────────────
  logger:
    build:
      context: ./docker/logger
      dockerfile: Dockerfile.logger
    image: access-logger-kjd:2.0.0
    container_name: kjd_logger
    restart: unless-stopped
    environment:
      # Формат разбора журналов (extended_ssl — с TLS-полями)
      - LOG_FORMAT=extended_ssl
      # Уровень журналирования самого агента
      - LOG_LEVEL=INFO
      # Путь к файлу журналов Nginx внутри контейнера
      - NGINX_LOG_PATH=/var/log/nginx/access.log
      # Порт syslog-сервера
      - SYSLOG_PORT=514
    volumes:
      # Том журналов Nginx (только чтение — КЖД не пишет в него)
      - nginx_logs:/var/log/nginx:ro
      # Том данных КЖД (SQLite-база с разобранными событиями)
      - logger_data:/app/data
    ports:
      # Syslog UDP: Nginx направляет события напрямую в КЖД
      - "514:514/udp"
      # REST API КЖД (только внутренняя сеть)
      - "8080:8080"
    networks:
      - internal
    depends_on:
      - nginx

# ── Именованные тома ────────────────────────────────────────────────────────
volumes:
  app_data:
    driver: local
  nginx_logs:
    driver: local
  logger_data:
    driver: local

# ── Сети ────────────────────────────────────────────────────────────────────
networks:
  # Внешняя сеть: только Nginx имеет к ней доступ
  frontend:
    driver: bridge

  # Внутренняя сеть: app, nginx, logger
  internal:
    driver: bridge
    internal: true
