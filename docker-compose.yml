version: '3.9'

# ═══════════════════════════════════════════════════════════
# Сети:
#   frontend — публичная (nginx ↔ клиент)
#   backend  — изолированная внутренняя (app ↔ nginx ↔ logger)
# ═══════════════════════════════════════════════════════════
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

# ═══════════════════════════════════════════════════════════
# Тома
# ═══════════════════════════════════════════════════════════
volumes:
  nginx_logs:
  app_data:
  logger_data:

# ═══════════════════════════════════════════════════════════
# Сервисы
# ═══════════════════════════════════════════════════════════
services:

  # ── Django-приложение ─────────────────────────────────────
  app:
    build: .
    container_name: dsla_app
    restart: unless-stopped
    networks:
      - backend
    # Порты НЕ публикуются наружу — доступ только через nginx
    environment:
      DJANGO_SETTINGS_MODULE: django_project.settings
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - app_data:/app/logger_app/data
      - app_data:/app/logger_app/logs
    depends_on: []
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/logger/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx (TLS-терминация, HTTP→HTTPS редирект) ───────────
  nginx:
    image: nginx:1.26-alpine
    container_name: dsla_nginx
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── КЖД v2.0 — Контейнер Журналирования и Диагностики ────
  logger:
    build:
      context: docker/logger
      dockerfile: Dockerfile.logger
    container_name: dsla_logger
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "8080:8080"
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - logger_data:/data
    environment:
      NGINX_LOG_PATH: /var/log/nginx/access.log
      DB_PATH:        /data/events.db
      SYSLOG_PORT:    "514"
      API_PORT:       "8080"
      LOG_FORMAT:     extended_ssl
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
