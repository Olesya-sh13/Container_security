# =============================================================================
# Конфигурация обратного прокси Nginx v1.26 LTS
# Обеспечивает:
#   - Принудительное перенаправление HTTP → HTTPS (301)
#   - TLS-терминацию (TLS 1.2 / 1.3)
#   - Передачу запросов приложению по внутренней сети
#   - Журналирование событий доступа в расширенном формате (extended_ssl)
# =============================================================================

# Количество рабочих процессов (авто = по числу CPU)
worker_processes auto;

# Лимит открытых файловых дескрипторов
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Базовые настройки ────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;   # Скрытие версии Nginx в заголовках ответа

    # ── Расширенный формат журнала (extended_ssl) ────────────────────────────
    # Поля: remote_addr, time, method+URI+proto, status, bytes,
    #       referer, user_agent, ssl_protocol, ssl_cipher, request_time
    log_format extended_ssl
        '$remote_addr [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'ssl_proto=$ssl_protocol ssl_cipher=$ssl_cipher '
        'rt=$request_time';

    # Журнал доступа: файл + syslog-агент (контейнер logger)
    access_log /var/log/nginx/access.log extended_ssl;
    access_log syslog:server=logger:514,facility=local7,tag=nginx,severity=info extended_ssl;
    error_log  /var/log/nginx/error.log  warn;

    # ── Настройки SSL-сессий ─────────────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Набор шифров (Mozilla Intermediate) ─────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── OCSP Stapling ────────────────────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Виртуальный хост: HTTP → HTTPS редирект (порт 80) ───────────────────
    server {
        listen 80;
        server_name _;

        # Перенаправление всех HTTP-запросов на HTTPS
        return 301 https://$host$request_uri;
    }

    # ── Виртуальный хост: HTTPS (порт 443) ──────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # Сертификат и приватный ключ
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # HSTS: принудительный HTTPS на 1 год, включая поддомены
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Дополнительные заголовки безопасности
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Проксирование запросов к приложению по внутренней сети
        location / {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Health-check эндпоинт для оркестраторов
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
